<svg xmlns="http://www.w3.org/2000/svg" width="200" height="44" viewBox="0 0 200 44">
  <!-- Icon square -->
  <rect x="0" y="2" width="40" height="40" rx="8" fill="white"/>
  <!-- Circuit lines horizontal divider -->
  <rect x="0" y="20" width="40" height="4" fill="#0a0a0a"/>
  <!-- Left node -->
  <circle cx="13" cy="22" r="4.5" fill="white" stroke="#0a0a0a" stroke-width="0"/>
  <circle cx="13" cy="22" r="3" fill="#0a0a0a"/>
  <circle cx="13" cy="22" r="1.2" fill="white"/>
  <!-- Vertical line -->
  <rect x="24" y="8" width="3" height="28" fill="#0a0a0a"/>
  <!-- Top node -->
  <circle cx="25.5" cy="12" r="4.5" fill="white" stroke="#0a0a0a" stroke-width="0"/>
  <circle cx="25.5" cy="12" r="3" fill="#0a0a0a"/>
  <circle cx="25.5" cy="12" r="1.2" fill="white"/>
  <!-- Bottom node -->
  <circle cx="25.5" cy="32" r="4.5" fill="white" stroke="#0a0a0a" stroke-width="0"/>
  <circle cx="25.5" cy="32" r="3" fill="#0a0a0a"/>
  <circle cx="25.5" cy="32" r="1.2" fill="white"/>
  <!-- Text: Neural -->
  <text x="50" y="31" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="26" fill="white">Neural</text>
  <!-- Text: Ops -->
  <text x="145" y="31" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="26" fill="white">
    <tspan fill="#beff01">O</tspan><tspan>ps</tspan>
  </text>
</svg>
